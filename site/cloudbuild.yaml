# Build and deploy the static Kovo docs site to Cloud Run.
#
# Submit from the repository root so the docs Dockerfile can install workspace
# dependencies:
#   gcloud builds submit --config site/cloudbuild.yaml .
#
# The Cloud Build service account needs roles/run.admin and
# roles/iam.serviceAccountUser to deploy (grant once):
#   PROJECT_ID=kovo-docs
#   PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member=serviceAccount:$PROJECT_NUMBER@cloudbuild.gserviceaccount.com --role=roles/run.admin
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member=serviceAccount:$PROJECT_NUMBER@cloudbuild.gserviceaccount.com --role=roles/iam.serviceAccountUser
#
# Prerequisite (once): an Artifact Registry repo named by _REPO in _REGION:
#   gcloud artifacts repositories create kovo --project=kovo-docs --repository-format=docker --location=us-central1

substitutions:
  _PROJECT_ID: kovo-docs
  _REGION: us-central1
  _REPO: kovo
  _SERVICE: kovo-docs
  _MEMORY: 512Mi
  _CPU: '1'
  _CONCURRENCY: '80'
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '10'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s

steps:
  - id: build
    name: gcr.io/cloud-builders/docker@sha256:6c9b879570fe1c63a78af0b575ca5ac52f6c2c7e25f76f91ae1f2d6cb2a872ee
    args:
      - build
      - -f
      - site/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/docs:${BUILD_ID}
      - .

  - id: smoke
    name: gcr.io/cloud-builders/docker@sha256:6c9b879570fe1c63a78af0b575ca5ac52f6c2c7e25f76f91ae1f2d6cb2a872ee
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/docs:${BUILD_ID}
        CID=$$(docker run -d -e PORT=8080 -e HOST=0.0.0.0 "$$IMAGE")
        trap 'docker logs "$$CID" || true; docker rm -f "$$CID" >/dev/null 2>&1 || true' EXIT

        for _ in $$(seq 1 20); do
          if docker exec "$$CID" node -e "fetch('http://127.0.0.1:8080/').then((r) => process.exit(r.ok ? 0 : 1), () => process.exit(1))"; then
            exit 0
          fi
          sleep 1
        done

        docker logs "$$CID"
        exit 1

  - id: push
    name: gcr.io/cloud-builders/docker@sha256:6c9b879570fe1c63a78af0b575ca5ac52f6c2c7e25f76f91ae1f2d6cb2a872ee
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/docs:${BUILD_ID}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk@sha256:db6c7fccfc6046e4b5a2180772d6426aa89cba5f84d879f2e89c989d9d08f4f7
    args:
      - gcloud
      - run
      - deploy
      - ${_SERVICE}
      - --project
      - ${_PROJECT_ID}
      - --image
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/docs:${BUILD_ID}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --no-invoker-iam-check
      - --command
      - node
      - --args
      - site/scripts/serve-static.mjs,--strictPort
      - --set-env-vars
      - HOST=0.0.0.0,NODE_ENV=production
      - --memory
      - ${_MEMORY}
      - --cpu
      - ${_CPU}
      - --concurrency
      - ${_CONCURRENCY}
      - --min-instances
      - ${_MIN_INSTANCES}
      - --max-instances
      - ${_MAX_INSTANCES}
      - --port
      - '8080'
      - --quiet
