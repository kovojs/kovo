# Build and deploy the static Kovo docs site to Cloud Run.
#
# Submit from the repository root so the docs Dockerfile can install workspace
# dependencies:
#   gcloud builds submit --config site/cloudbuild.yaml .
#
# The Cloud Build service account needs roles/run.admin and
# roles/iam.serviceAccountUser to deploy (grant once):
#   PROJECT_NUMBER=$(gcloud projects describe $PROJECT --format='value(projectNumber)')
#   gcloud projects add-iam-policy-binding $PROJECT \
#     --member=serviceAccount:$PROJECT_NUMBER@cloudbuild.gserviceaccount.com --role=roles/run.admin
#   gcloud projects add-iam-policy-binding $PROJECT \
#     --member=serviceAccount:$PROJECT_NUMBER@cloudbuild.gserviceaccount.com --role=roles/iam.serviceAccountUser
#
# Prerequisite (once): an Artifact Registry repo named by _REPO in _REGION:
#   gcloud artifacts repositories create kovo --repository-format=docker --location=us-central1

substitutions:
  _REGION: us-central1
  _REPO: kovo
  _SERVICE: kovo-docs
  _TAG: latest
  _MEMORY: 512Mi
  _CPU: '1'
  _CONCURRENCY: '80'
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '10'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - site/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/docs:${_TAG}
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/docs:${_TAG}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/docs:${_TAG}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - ${_MEMORY}
      - --cpu
      - ${_CPU}
      - --concurrency
      - ${_CONCURRENCY}
      - --min-instances
      - ${_MIN_INSTANCES}
      - --max-instances
      - ${_MAX_INSTANCES}
      - --port
      - '8080'
      - --quiet
