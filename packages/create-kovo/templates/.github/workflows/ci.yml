name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Pin every executable action by commit so a mutable tag cannot replace CI code
      # after review (SPEC §2 supply-chain default-deny).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      # Restore Kovo's content-addressed build cache (static security analysis, compiler output,
      # tsc build-info). Keys are content-hashed and project-relative, so a restore turns a cold
      # `kovo build` (tens of seconds) into a warm one (seconds). Per-file invalidation lives inside
      # the cache, so the broad restore-key is safe.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .kovo/cache
          key: kovo-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            kovo-cache-${{ runner.os }}-
      - run: vp install --frozen-lockfile
      - run: vp check
      - run: vp test
      - run: vp exec pnpm run build:prod
