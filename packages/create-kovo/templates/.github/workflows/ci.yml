name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Pin every executable action by commit so a mutable tag cannot replace CI code
      # after review (SPEC §2 supply-chain default-deny).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # Do not leave the short-lived repository token in git configuration for
          # dependency hooks or project tests to recover during pull-request CI.
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          # Match the default Postgres starter's declared production runtime floor.
          node-version: 24.10.0
      # Restore Kovo's content-addressed build cache (static security analysis, compiler output,
      # tsc build-info). Keys are content-hashed and project-relative, so a restore turns a cold
      # `kovo build` (tens of seconds) into a warm one (seconds). Per-file invalidation lives inside
      # the cache, so the broad restore-key is safe.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .kovo/cache
          key: kovo-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            kovo-cache-${{ runner.os }}-
      - run: vp install --frozen-lockfile
      # Run the package script, not bare `vp check`: the script also enforces the
      # sound TypeScript subset, endpoint posture, and production graph proof.
      - run: vp exec pnpm run check
      - run: vp exec pnpm run test
      - run: vp exec pnpm run build:prod
