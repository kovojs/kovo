# Build the demo examples image once and deploy one Cloud Run service per example.
# This Cloud Run image is for hosted framework demos. App-author production
# deploys should use `kovo build` and the generated native preset artifacts
# instead of this Vite-from-source demo container.
#
#   gcloud builds submit --config cloudbuild.yaml .
#
# Override substitutions as needed, e.g.:
#   gcloud builds submit --config cloudbuild.yaml . \
#     --substitutions=_REGION=europe-west1,_MIN_INSTANCES=0
#
# The Cloud Build service account needs roles/run.admin and
# roles/iam.serviceAccountUser to deploy (grant once):
#   PROJECT_ID=kovo-docs
#   PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member=serviceAccount:$PROJECT_NUMBER@cloudbuild.gserviceaccount.com --role=roles/run.admin
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member=serviceAccount:$PROJECT_NUMBER@cloudbuild.gserviceaccount.com --role=roles/iam.serviceAccountUser
#
# Prerequisite (once): an Artifact Registry repo named by _REPO in _REGION:
#   gcloud artifacts repositories create kovo --project=kovo-docs --repository-format=docker --location=us-central1
#
# Prerequisite (once): Secret Manager entries for the production demo CSRF/webhook secrets:
#   printf '%s' "$(openssl rand -base64 32)" | gcloud secrets create stackoverflow-csrf-secret --project=kovo-docs --data-file=-
#   printf '%s' "$(openssl rand -base64 32)" | gcloud secrets create crm-csrf-secret --project=kovo-docs --data-file=-
#   printf '%s' "$(openssl rand -base64 32)" | gcloud secrets create commerce-csrf-secret --project=kovo-docs --data-file=-
#   printf '%s' "$(openssl rand -base64 32)" | gcloud secrets create commerce-auth-csrf-secret --project=kovo-docs --data-file=-
#   printf '%s' "$(openssl rand -base64 32)" | gcloud secrets create commerce-webhook-secret --project=kovo-docs --data-file=-

substitutions:
  _PROJECT_ID: kovo-docs
  _REGION: us-central1
  _REPO: kovo
  _TAG: latest
  _MEMORY: 4Gi
  _CPU: '1'
  _CONCURRENCY: '10'
  _MIN_INSTANCES: '1' # session state lives in instance memory; 0 = scale-to-zero, resets on cold start
  _MAX_INSTANCES: '10'
  _SESSION_AFFINITY: 'true' # best-effort routing back to the instance holding the visitor demo DB
  _MAX_SESSIONS: '40'
  _WARM_SESSIONS: '10'
  _IDLE_MS: '1200000' # 20 min idle TTL per session
  _COMMERCE_CSRF_SECRET_NAME: 'commerce-csrf-secret'
  _COMMERCE_AUTH_CSRF_SECRET_NAME: 'commerce-auth-csrf-secret'
  _COMMERCE_WEBHOOK_SECRET_NAME: 'commerce-webhook-secret'
  _CRM_CSRF_SECRET_NAME: 'crm-csrf-secret'
  _STACKOVERFLOW_CSRF_SECRET_NAME: 'stackoverflow-csrf-secret'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8 # pnpm install + three vite builds; bump/remove to taste

timeout: 1800s

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/examples:${_TAG}
      - .

  - id: smoke-stackoverflow-styles
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/examples:${_TAG}
        CID=$$(docker run -d \
          -e EXAMPLE=stackoverflow \
          -e PORT=8080 \
          -e HOST=0.0.0.0 \
          -e KOVO_STACKOVERFLOW_CSRF_SECRET=cloud-build-smoke-stackoverflow-csrf-secret \
          "$$IMAGE")
        trap 'docker logs "$$CID" || true; docker rm -f "$$CID" >/dev/null 2>&1 || true' EXIT

        node_check='
          const http = require("node:http");
          const path = process.argv[1];
          const expectedType = process.argv[2];
          const expectedBody = process.argv[3];
          const req = http.request(
            {
              headers: { host: "kovo-stackoverflow-sfqtuclaza-uc.a.run.app" },
              host: "127.0.0.1",
              path,
              port: 8080,
            },
            (res) => {
              const chunks = [];
              res.on("data", (chunk) => chunks.push(chunk));
              res.on("end", () => {
                const body = Buffer.concat(chunks).toString("utf8");
                const type = String(res.headers["content-type"] || "");
                if (
                  res.statusCode !== 200 ||
                  !type.startsWith(expectedType) ||
                  body.includes("Blocked request") ||
                  (expectedBody && !body.includes(expectedBody))
                ) {
                  console.error(`${path} status=${res.statusCode} type=${type}`);
                  console.error(body.slice(0, 500));
                  process.exit(1);
                }
              });
            },
          );
          req.on("error", (error) => {
            console.error(error);
            process.exit(1);
          });
          req.end();
        '

        for _ in $$(seq 1 60); do
          if docker exec "$$CID" node -e "$$node_check" / 'text/html'; then
            docker exec "$$CID" node -e "$$node_check" /assets/styles.css 'text/css' 'kv-chrome-'
            exit 0
          fi
          sleep 1
        done

        docker logs "$$CID"
        exit 1

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/examples:${_TAG}

  # One service per example from the single image, differing only by EXAMPLE.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/examples:${_TAG}
        for EX in commerce crm stackoverflow; do
          echo "Deploying kovo-$$EX ..."
          ENV_VARS="EXAMPLE=$$EX,KOVO_DEMO_MAX_SESSIONS=${_MAX_SESSIONS},KOVO_DEMO_WARM_SESSIONS=${_WARM_SESSIONS},KOVO_DEMO_IDLE_MS=${_IDLE_MS}"
          SECRET_FLAGS=()
          AFFINITY_FLAGS=(--session-affinity)
          if [[ "${_SESSION_AFFINITY}" != "true" ]]; then
            AFFINITY_FLAGS=(--no-session-affinity)
          fi
          if [[ "$$EX" == "commerce" ]]; then
            SECRET_FLAGS=(--set-secrets "KOVO_COMMERCE_CSRF_SECRET=${_COMMERCE_CSRF_SECRET_NAME}:latest,KOVO_COMMERCE_AUTH_CSRF_SECRET=${_COMMERCE_AUTH_CSRF_SECRET_NAME}:latest,COMMERCE_WEBHOOK_SECRET=${_COMMERCE_WEBHOOK_SECRET_NAME}:latest")
          elif [[ "$$EX" == "crm" ]]; then
            SECRET_FLAGS=(--set-secrets "KOVO_CRM_CSRF_SECRET=${_CRM_CSRF_SECRET_NAME}:latest")
          elif [[ "$$EX" == "stackoverflow" ]]; then
            SECRET_FLAGS=(--set-secrets "KOVO_STACKOVERFLOW_CSRF_SECRET=${_STACKOVERFLOW_CSRF_SECRET_NAME}:latest")
          fi
          gcloud run deploy kovo-$$EX \
            --project ${_PROJECT_ID} \
            --image "$$IMAGE" \
            --region ${_REGION} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "$$ENV_VARS" \
            "$${SECRET_FLAGS[@]}" \
            --memory ${_MEMORY} \
            --cpu ${_CPU} \
            --concurrency ${_CONCURRENCY} \
            --min-instances ${_MIN_INSTANCES} \
            --max-instances ${_MAX_INSTANCES} \
            "$${AFFINITY_FLAGS[@]}" \
            --quiet
        done
