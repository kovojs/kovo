# Build the demo examples image once and deploy one Cloud Run service per example.
# This Cloud Run image is for hosted framework demos. App-author production
# deploys should use `kovo build` and the generated native preset artifacts
# instead of this Vite-from-source demo container.
#
#   gcloud builds submit --config cloudbuild.yaml .
#
# Override substitutions as needed, e.g.:
#   gcloud builds submit --config cloudbuild.yaml . \
#     --substitutions=_REGION=europe-west1,_MIN_INSTANCES=0
#
# The Cloud Build service account needs roles/run.admin and
# roles/iam.serviceAccountUser to deploy (grant once):
#   PROJECT_ID=kovo-docs
#   PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member=serviceAccount:$PROJECT_NUMBER@cloudbuild.gserviceaccount.com --role=roles/run.admin
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member=serviceAccount:$PROJECT_NUMBER@cloudbuild.gserviceaccount.com --role=roles/iam.serviceAccountUser
#
# Prerequisite (once): an Artifact Registry repo named by _REPO in _REGION:
#   gcloud artifacts repositories create kovo --project=kovo-docs --repository-format=docker --location=us-central1

substitutions:
  _PROJECT_ID: kovo-docs
  _REGION: us-central1
  _REPO: kovo
  _TAG: latest
  _MEMORY: 2Gi
  _CPU: '1'
  _CONCURRENCY: '10'
  _MIN_INSTANCES: '1' # session state lives in instance memory; 0 = scale-to-zero, resets on cold start
  _MAX_INSTANCES: '10'
  _SESSION_AFFINITY: 'true' # best-effort routing back to the instance holding the visitor demo DB
  _MAX_SESSIONS: '40'
  _WARM_SESSIONS: '10'
  _IDLE_MS: '1200000' # 20 min idle TTL per session
  _COMMERCE_CSRF_SECRET_NAME: 'commerce-csrf-secret'
  _COMMERCE_AUTH_CSRF_SECRET_NAME: 'commerce-auth-csrf-secret'
  _COMMERCE_WEBHOOK_SECRET_NAME: 'commerce-webhook-secret'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8 # pnpm install + three vite builds; bump/remove to taste

timeout: 1800s

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/examples:${_TAG}
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/examples:${_TAG}

  # One service per example from the single image, differing only by EXAMPLE.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/examples:${_TAG}
        for EX in commerce crm stackoverflow; do
          echo "Deploying kovo-$$EX ..."
          ENV_VARS="EXAMPLE=$$EX,KOVO_DEMO_MAX_SESSIONS=${_MAX_SESSIONS},KOVO_DEMO_WARM_SESSIONS=${_WARM_SESSIONS},KOVO_DEMO_IDLE_MS=${_IDLE_MS}"
          SECRET_FLAGS=()
          AFFINITY_FLAGS=(--session-affinity)
          if [[ "${_SESSION_AFFINITY}" != "true" ]]; then
            AFFINITY_FLAGS=(--no-session-affinity)
          fi
          if [[ "$$EX" == "commerce" ]]; then
            SECRET_FLAGS=(--set-secrets "KOVO_COMMERCE_CSRF_SECRET=${_COMMERCE_CSRF_SECRET_NAME}:latest,KOVO_COMMERCE_AUTH_CSRF_SECRET=${_COMMERCE_AUTH_CSRF_SECRET_NAME}:latest,COMMERCE_WEBHOOK_SECRET=${_COMMERCE_WEBHOOK_SECRET_NAME}:latest")
          fi
          gcloud run deploy kovo-$$EX \
            --project ${_PROJECT_ID} \
            --image "$$IMAGE" \
            --region ${_REGION} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "$$ENV_VARS" \
            "$${SECRET_FLAGS[@]}" \
            --memory ${_MEMORY} \
            --cpu ${_CPU} \
            --concurrency ${_CONCURRENCY} \
            --min-instances ${_MIN_INSTANCES} \
            --max-instances ${_MAX_INSTANCES} \
            "$${AFFINITY_FLAGS[@]}" \
            --quiet
        done
