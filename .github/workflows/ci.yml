name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec pnpm run check

  api-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec pnpm run check:api-surface

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec playwright install --with-deps chromium
      - run: vp exec vitest --run --shard=${{ matrix.shard }}/${{ matrix.total }}

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec playwright install --with-deps chromium firefox webkit
      - run: vp run browser
      - run: vp exec pnpm --filter @kovojs/example-gallery run test:browser

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec playwright install --with-deps chromium firefox webkit
      - run: vp run integration

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp run build

  publish-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec pnpm run check:publish

  p10-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp run build
      - run: vp exec playwright install --with-deps chromium
      - run: vp run p10-perf

  compiler-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp run compiler-perf

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp run conformance

  kovo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp run build
      - run: vp run kovo-check

  check:
    runs-on: ubuntu-latest
    needs:
      - format
      - api-surface
      - test
      - browser
      - integration
      - build
      - publish-check
      - p10-perf
      - compiler-perf
      - conformance
      - kovo-check
    if: always()
    steps:
      - name: Verify required CI shards
        run: |
          if [ '${{ contains(needs.*.result, 'failure') }}' = 'true' ] || [ '${{ contains(needs.*.result, 'cancelled') }}' = 'true' ] || [ '${{ contains(needs.*.result, 'skipped') }}' = 'true' ]; then
            echo "One or more CI shards failed, were cancelled, or were skipped."
            exit 1
          fi
          echo "All CI shards passed."
