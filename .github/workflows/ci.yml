name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_OPTIONS: --experimental-transform-types --disable-warning=ExperimentalWarning

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec pnpm run check

  api-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec pnpm run check:api-surface

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - run: vp exec pnpm rebuild better-sqlite3
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec playwright install --with-deps chromium
      - run: vp exec vitest --run --shard=${{ matrix.shard }}/${{ matrix.total }}

  sql-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - run: vp exec pnpm rebuild better-sqlite3
      - run: |
          vp exec vitest --run \
            packages/core/src/sql-safety.test.ts \
            packages/server/src/guards.test.ts \
            packages/test/src/query-verifier.test.ts \
            packages/test/src/verifier-sql.test.ts \
            packages/drizzle/src/sql-safety-static.test.ts \
            packages/cli/src/index.kovo-compile.test.ts \
            packages/drizzle/src/runtime-surface.test.ts \
            packages/core/src/diagnostics.test.ts \
            packages/test/src/pglite-harness.test.ts \
            packages/test/src/sqlite-harness.test.ts
      - run: git diff --check

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec playwright install --with-deps chromium firefox webkit
      - run: vp run browser

  gallery-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec playwright install --with-deps --no-shell chromium
      - run: |
          Xvfb :99 -screen 0 1280x720x24 >/tmp/kovo-gallery-xvfb.log 2>&1 &
          export DISPLAY=:99
          vp exec pnpm --filter @kovojs/example-gallery run test:browser
        env:
          KOVO_GALLERY_BROWSER_HEADED: '1'

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec playwright install --with-deps chromium firefox webkit
      - run: vp run integration

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          if-no-files-found: error
          name: kovo-dist
          path: dist
          retention-days: 1

  publish-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec pnpm run check:publish

  p10-perf:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: kovo-dist
          path: dist
      - run: vp exec playwright install --with-deps chromium
      - run: vp run p10-perf

  compiler-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp run compiler-perf

  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [drizzle-pin, better-auth-pin, auth-spike, webhook-spike, app-shell-spike]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec pnpm --filter @kovojs/conformance-${{ matrix.suite }} test

  kovo-check:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        suite: [compiler-runtime, server-browser, project]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: 22.15.0
      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: kovo-dist
          path: dist
      - run: vp exec node scripts/kovo-check.mjs --suite ${{ matrix.suite }}

  check:
    runs-on: ubuntu-latest
    needs:
      - format
      - api-surface
      - test
      - sql-safety
      - browser
      - gallery-browser
      - integration
      - build
      - publish-check
      - p10-perf
      - compiler-perf
      - conformance
      - kovo-check
    if: always()
    steps:
      - name: Verify required CI shards
        run: |
          if [ '${{ contains(needs.*.result, 'failure') }}' = 'true' ] || [ '${{ contains(needs.*.result, 'cancelled') }}' = 'true' ] || [ '${{ contains(needs.*.result, 'skipped') }}' = 'true' ]; then
            echo "One or more CI shards failed, were cancelled, or were skipped."
            exit 1
          fi
          echo "All CI shards passed."
