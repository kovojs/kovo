name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --experimental-transform-types --disable-warning=ExperimentalWarning
  PLAYWRIGHT_VERSION: 1.60.0

jobs:
  static-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/kovo-setup
        with:
          rebuild-better-sqlite3: 'true'
      - name: Format, type, and import checks
        run: vp exec pnpm run check
      - name: API surface
        run: vp exec pnpm run check:api-surface
      - name: SQL safety
        run: |
          vp exec vitest --run \
            packages/core/src/sql-safety.test.ts \
            packages/server/src/guards.test.ts \
            packages/test/src/query-verifier.test.ts \
            packages/test/src/verifier-sql.test.ts \
            packages/drizzle/src/sql-safety-static.test.ts \
            packages/cli/src/index.kovo-compile.test.ts \
            packages/drizzle/src/runtime-surface.test.ts \
            packages/core/src/diagnostics.test.ts \
            packages/test/src/pglite-harness.test.ts \
            packages/test/src/sqlite-harness.test.ts
      - name: Metamorphic recognition
        run: vp exec vitest --run packages/conformance-fixtures/src/metamorphic-recognition-fixtures.test.ts
      - name: Compiler perf
        run: vp run compiler-perf
      - name: Publish readiness
        run: vp exec pnpm run check:publish
      - run: git diff --check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        total: [3]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/kovo-setup
        with:
          rebuild-better-sqlite3: 'true'
      - uses: ./.github/actions/playwright-install
        with:
          browsers: chromium
          cache-key: kovo-playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-key: kovo-playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-chromium-
      - name: Download previous timing history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/kovo-timing"
          run_id="$(gh run list --workflow CI --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId // ""')"
          if [ -n "$run_id" ]; then
            gh run download "$run_id" -n kovo-root-timing-history-${{ matrix.shard }} -D "$RUNNER_TEMP/kovo-timing" || true
          fi
      - id: shard
        name: Generate deterministic test shard
        run: |
          manifest="$(vp exec node scripts/ci-shards.mjs generate --kind vitest --shards ${{ matrix.total }} --index ${{ matrix.shard }} --outDir "$RUNNER_TEMP/kovo-shards" --history "$RUNNER_TEMP/kovo-timing/timing-history.json")"
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"
      - name: Root Vitest shard
        run: |
          xargs -a "${{ steps.shard.outputs.manifest }}" vp exec vitest --run --reporter=default --reporter=json --outputFile="$RUNNER_TEMP/kovo-vitest-${{ matrix.shard }}.json"
      - name: Merge root timing history
        if: always()
        run: |
          vp exec node scripts/ci-shards.mjs merge-vitest --previous "$RUNNER_TEMP/kovo-timing/timing-history.json" --report "$RUNNER_TEMP/kovo-vitest-${{ matrix.shard }}.json" --out "$RUNNER_TEMP/kovo-root-timing-history/timing-history.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          if-no-files-found: error
          name: kovo-root-timing-history-${{ matrix.shard }}
          path: ${{ runner.temp }}/kovo-root-timing-history/timing-history.json
          retention-days: 7

  starter-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/kovo-setup
      - name: Pack starter workspace packages
        run: vp exec node scripts/ci-shards.mjs pack-starter --outDir "$RUNNER_TEMP/kovo-packed-starter"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          if-no-files-found: error
          name: kovo-packed-starter
          path: ${{ runner.temp }}/kovo-packed-starter
          retention-days: 7

  starter:
    needs: starter-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Shard budget: 3 root Vitest + 8 starter + 3 integration + 2 kovo-check = 16.
        # Starter entries are timing-weighted in scripts/ci-shards.mjs from the
        # latest successful 2026-07-01 run so long artifact proofs are balanced.
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
        total: [8]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/kovo-setup
        with:
          rebuild-better-sqlite3: 'true'
      - id: starter-shard
        name: Generate balanced starter shard
        run: |
          manifest="$(vp exec node scripts/ci-shards.mjs generate-starter --shards ${{ matrix.total }} --index ${{ matrix.shard }} --outDir "$RUNNER_TEMP/kovo-starter-shards")"
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"
          if vp exec node scripts/ci-shards.mjs starter-needs-browser --manifest "$manifest"; then
            echo "needsBrowser=true" >> "$GITHUB_OUTPUT"
          else
            echo "needsBrowser=false" >> "$GITHUB_OUTPUT"
          fi
          if vp exec node scripts/ci-shards.mjs starter-needs-packed --manifest "$manifest"; then
            echo "needsPacked=true" >> "$GITHUB_OUTPUT"
          else
            echo "needsPacked=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Chromium for browser-backed starter shard
        if: steps.starter-shard.outputs.needsBrowser == 'true'
        uses: ./.github/actions/playwright-install
        with:
          browsers: chromium
          cache-key: kovo-playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-key: kovo-playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-chromium-
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        if: steps.starter-shard.outputs.needsPacked == 'true'
        with:
          name: kovo-packed-starter
          path: ${{ runner.temp }}/kovo-packed-starter
      - name: Generated starter proofs (${{ matrix.shard }})
        env:
          KOVO_PACKED_PACKAGES_DIR: ${{ runner.temp }}/kovo-packed-starter
        run: vp exec node scripts/ci-shards.mjs run-starter --manifest "${{ steps.starter-shard.outputs.manifest }}"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/kovo-setup
      - run: vp exec pnpm run check:build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          if-no-files-found: error
          name: kovo-dist
          path: dist
          retention-days: 1

  browser:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/kovo-setup
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: kovo-dist
          path: dist
      - uses: ./.github/actions/playwright-install
        with:
          browsers: chromium firefox webkit
          cache-key: kovo-playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-all-${{ hashFiles('pnpm-lock.yaml') }}
          restore-key: kovo-playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-all-
      - name: Root browser suite
        run: vp run browser
      - name: Gallery browser suite
        run: |
          Xvfb :99 -screen 0 1280x720x24 >/tmp/kovo-gallery-xvfb.log 2>&1 &
          export DISPLAY=:99
          vp exec pnpm --filter @kovojs/example-gallery run test:browser
        env:
          KOVO_GALLERY_BROWSER_HEADED: '1'
      - name: P10 perf
        run: vp run p10-perf

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        total: [3]
    env:
      KOVO_FAIL_ON_FLAKY: '1'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/kovo-setup
      - uses: ./.github/actions/playwright-install
        with:
          browsers: chromium firefox webkit
          cache-key: kovo-playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-all-${{ hashFiles('pnpm-lock.yaml') }}
          restore-key: kovo-playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-all-
      - run: vp exec playwright test --config tests/integration/playwright.config.ts --shard=${{ matrix.shard }}/${{ matrix.total }}
        env:
          KOVO_PLAYWRIGHT_TIMING_JSON: ${{ runner.temp }}/kovo-integration-timing-history/timing-history.json
      - name: Ensure integration timing artifact
        if: always()
        env:
          KOVO_PLAYWRIGHT_TIMING_JSON: ${{ runner.temp }}/kovo-integration-timing-history/timing-history.json
        run: |
          mkdir -p "$RUNNER_TEMP/kovo-integration-timing-history"
          test -f "$KOVO_PLAYWRIGHT_TIMING_JSON" || printf '{}\n' > "$KOVO_PLAYWRIGHT_TIMING_JSON"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          if-no-files-found: error
          name: kovo-integration-timing-history-${{ matrix.shard }}
          path: ${{ runner.temp }}/kovo-integration-timing-history/timing-history.json
          retention-days: 7

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/kovo-setup
      - name: Drizzle pinned conformance
        run: vp exec pnpm --filter @kovojs/conformance-drizzle-pin test
      - name: Better Auth pinned conformance
        run: vp exec pnpm --filter @kovojs/conformance-better-auth-pin test
      - name: Auth spike conformance
        run: vp exec pnpm --filter @kovojs/conformance-auth-spike test
      - name: Webhook spike conformance
        run: vp exec pnpm --filter @kovojs/conformance-webhook-spike test
      - name: App shell spike conformance
        run: vp exec pnpm --filter @kovojs/conformance-app-shell-spike test

  kovo-check:
    name: kovo-check (${{ matrix.preset }}, ${{ matrix.dialect }})
    runs-on: ubuntu-latest
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: node-pglite
            suites: compiler-runtime server-browser project
            preset: node
            dialect: pglite
          - shard: node-better-sqlite3
            suites: compiler-runtime server-browser project
            preset: node
            dialect: better-sqlite3
          - shard: cloudflare-pglite
            suites: compiler-runtime server-browser project
            preset: cloudflare
            dialect: pglite
          - shard: cloudflare-better-sqlite3
            suites: compiler-runtime server-browser project
            preset: cloudflare
            dialect: better-sqlite3
          - shard: vercel-pglite
            suites: compiler-runtime server-browser project
            preset: vercel
            dialect: pglite
          - shard: vercel-better-sqlite3
            suites: compiler-runtime server-browser project
            preset: vercel
            dialect: better-sqlite3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/kovo-setup
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: kovo-dist
          path: dist
      - name: Kovo check suite
        run: vp exec node scripts/kovo-check.mjs ${{ matrix.suites }}
        env:
          KOVO_SECURITY_PRESET: ${{ matrix.preset }}
          KOVO_SECURITY_DIALECT: ${{ matrix.dialect }}

  check:
    runs-on: ubuntu-latest
    needs:
      - static-safety
      - test
      - starter-packages
      - starter
      - integration
      - build
      - browser
      - conformance
      - kovo-check
    if: always()
    steps:
      - name: Verify required CI shards
        run: |
          if [ '${{ contains(needs.*.result, 'failure') }}' = 'true' ] || [ '${{ contains(needs.*.result, 'cancelled') }}' = 'true' ] || [ '${{ contains(needs.*.result, 'skipped') }}' = 'true' ]; then
            echo "One or more CI shards failed, were cancelled, or were skipped."
            exit 1
          fi
          echo "All CI shards passed."
