name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24

      - run: vp install
      - id: compiler-cache-key
        run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: |
            .kovo/cache
            **/.kovo/cache
          key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
      - run: vp exec pnpm --filter @kovojs/example-gallery run emit:interactive-gallery
      - run: vp run build
      - run: vp run --no-cache export
        working-directory: site
      - run: vp run check-links
        working-directory: site
      - run: vp exec playwright install --with-deps chromium
      - run: vp run smoke
        working-directory: site
      - run: touch site/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
