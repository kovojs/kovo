name: Race-Prone Integration Repeats

on:
  schedule:
    - cron: '17 9 * * 1'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/race-repeat.yml'
      - 'packages/browser/**'
      - 'packages/compiler/**'
      - 'packages/server/**'
      - 'packages/test/**'
      - 'tests/integration/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_OPTIONS: --experimental-transform-types --disable-warning=ExperimentalWarning
  KOVO_FAIL_ON_FLAKY: '1'
  PLAYWRIGHT_VERSION: 1.60.0

jobs:
  race-prone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ./.github/actions/kovo-setup
      - uses: ./.github/actions/playwright-install
        with:
          browsers: chromium
          cache-key: kovo-playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-key: kovo-playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-chromium-
      - run: vp exec playwright test --config tests/integration/playwright.config.ts --project=chromium --grep @race-prone --repeat-each=3 --workers=1
