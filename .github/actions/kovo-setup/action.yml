name: Kovo setup
description: Install the pinned Kovo CI toolchain and restore incremental TypeScript build info.

inputs:
  node-version:
    description: Node.js version for voidzero setup-vp.
    default: 24.18.0
  vp-version:
    description: Vite+ version for voidzero setup-vp.
    default: 0.1.24
  rebuild-better-sqlite3:
    description: Run the better-sqlite3 native rebuild after install.
    default: 'false'

runs:
  using: composite
  steps:
    - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
      with:
        node-version: ${{ inputs.node-version }}
        version: ${{ inputs.vp-version }}
    - run: vp install --frozen-lockfile
      shell: bash
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: |
          .kovo/cache/*.tsbuildinfo
          **/.kovo/cache/*.tsbuildinfo
        key: kovo-tsc-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('**/tsconfig*.json', 'packages/*/package.json', 'pnpm-lock.yaml') }}
        restore-keys: |
          kovo-tsc-${{ runner.os }}-${{ inputs.node-version }}-
    - if: ${{ inputs['rebuild-better-sqlite3'] == 'true' }}
      run: vp exec pnpm rebuild better-sqlite3
      shell: bash
