name: Kovo setup
description: Install the pinned Kovo CI toolchain and restore compiler cache.

inputs:
  node-version:
    description: Node.js version for voidzero setup-vp.
    default: 22.15.0
  rebuild-better-sqlite3:
    description: Run the better-sqlite3 native rebuild after install.
    default: 'false'

runs:
  using: composite
  steps:
    - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
      with:
        node-version: ${{ inputs.node-version }}
    - run: vp install
      shell: bash
    - id: compiler-cache-key
      run: echo "id=$(vp exec node scripts/compiler-build-id.mjs)" >> "$GITHUB_OUTPUT"
      shell: bash
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: |
          .kovo/cache
          **/.kovo/cache
        key: kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-${{ hashFiles('packages/compiler/src/**', 'packages/*/package.json', 'pnpm-lock.yaml') }}
        restore-keys: |
          kovo-compiler-${{ runner.os }}-${{ steps.compiler-cache-key.outputs.id }}-
    - if: ${{ inputs['rebuild-better-sqlite3'] == 'true' }}
      run: vp exec pnpm rebuild better-sqlite3
      shell: bash
